<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetUs.Fit – My Plans</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Calendar ── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }
    .cal-nav h2 { margin: 0; font-size: 1.1rem; color: #e0e0e0; }
    .cal-nav-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #ccc;
      cursor: pointer;
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 1rem;
      line-height: 1;
      transition: background 0.15s;
    }
    .cal-nav-btn:hover { background: #2a2a2a; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-day-name {
      text-align: center;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      padding: 4px 0 8px;
    }
    .cal-cell {
      min-height: 72px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 4px;
      padding: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .cal-cell:hover { border-color: #444; background: #161616; }
    .cal-cell.other-month { opacity: 0.35; pointer-events: none; }
    .cal-cell.today { border-color: #cc1a1a; }
    .cal-cell.selected { border-color: #cc1a1a; background: #1a0808; }
    .cal-date {
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 4px;
    }
    .cal-cell.today .cal-date { color: #cc1a1a; font-weight: 700; }
    .cal-dots { display: flex; flex-wrap: wrap; gap: 3px; }
    .cal-dot {
      display: block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cc1a1a;
    }
    .cal-dot.plan-linked { background: #1a7a1a; }
    .cal-dot-label {
      font-size: 0.68rem;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      margin-top: 2px;
    }

    /* ── Day detail panel ── */
    #day-panel {
      display: none;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    #day-panel h3 { margin: 0 0 16px; font-size: 1rem; color: #cc1a1a; }
    .schedule-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .schedule-item:last-of-type { border-bottom: none; }
    .schedule-item-info { flex: 1; }
    .schedule-item-title { font-weight: 700; color: #e0e0e0; font-size: 0.92rem; }
    .schedule-item-meta { font-size: 0.8rem; color: #777; margin-top: 2px; }
    .schedule-item-notes { font-size: 0.82rem; color: #999; margin-top: 4px; font-style: italic; }
    .schedule-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-xs { padding: 4px 10px; font-size: 0.8rem; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; letter-spacing: 0.05em; text-transform: uppercase; }
    .btn-xs.danger { background: #7c1a1a; color: #fdd; }
    .btn-xs.complete { background: #1a4a1a; color: #cfc; }

    /* ── Add / Edit form ── */
    #schedule-form {
      display: none;
      margin-top: 16px;
      border-top: 1px solid #2a2a2a;
      padding-top: 16px;
    }
    #schedule-form h4 { margin: 0 0 12px; color: #e0e0e0; font-size: 0.9rem; }
    .form-error { color: #e55; font-size: 0.85rem; min-height: 1.2em; margin-top: 8px; }
    .form-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

    /* ── Trainer athlete selector ── */
    #athlete-bar {
      display: none;
      margin-bottom: 16px;
    }
    .athlete-bar-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .athlete-bar-inner label { color: #888; font-size: 0.85rem; }
    .athlete-bar-inner select {
      background: #111;
      color: #d4d4d4;
      border: 1px solid #3a3a3a;
      border-radius: 3px;
      padding: 7px 10px;
      font-size: 0.9rem;
      font-family: inherit;
    }

    @media (max-width: 540px) {
      .cal-cell { min-height: 50px; padding: 4px; }
      .cal-dot { width: 6px; height: 6px; }
      .cal-dot-label { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a class="brand" href="index.html"><img src="Assets/GetUsTransparent.png" alt="GetUs.Fit" class="brand-logo" /></a>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Home</a>
    <a href="progression.html">Progression</a>
    <a href="weight.html">Weight</a>
    <a href="calories.html">Calories</a>
    <a href="my-plans.html" class="active">My Plans</a>
  </div>
  <div class="nav-right">
    <div class="nav-user">
      <a class="nav-username" id="nav-username-display" href="profile.html"></a>
      <button class="btn-nav-logout" onclick="Auth.logout()">Logout</button>
    </div>
    <button class="nav-burger" id="nav-burger" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
  </div>
</nav>

<main>
  <h1>My Plans</h1>
  <p class="subtitle">Schedule workouts on your calendar. Click any day to add or view plans.</p>

  <!-- ── Trainer: athlete switcher ─────────────────────────────────────── -->
  <div id="athlete-bar">
    <div class="athlete-bar-inner">
      <label for="athlete-select">Viewing schedule for:</label>
      <select id="athlete-select">
        <option value="">My own schedule</option>
      </select>
    </div>
  </div>

  <!-- ── Day detail / form panel ───────────────────────────────────────── -->
  <div id="day-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <h3 id="day-panel-title">Monday, 1 January 2025</h3>
      <button class="btn btn-secondary" id="close-day-panel" style="padding:5px 14px;font-size:0.85rem;">✕ Close</button>
    </div>

    <div id="day-items">
      <p style="color:#666;font-size:0.9rem;margin:0;">No workouts scheduled for this day.</p>
    </div>

    <!-- Add / Edit form -->
    <div id="schedule-form">
      <h4 id="form-title">Add Workout</h4>
      <input type="hidden" id="editing-id" value="" />

      <div class="form-row">
        <div class="form-group" style="flex:2;min-width:180px;">
          <label for="form-title-input">Title</label>
          <input type="text" id="form-title-input" placeholder="e.g. Upper Body Strength" />
        </div>
        <div class="form-group" style="flex:2;min-width:180px;">
          <label for="form-plan-select">Link to Plan (optional)</label>
          <select id="form-plan-select">
            <option value="">— no plan —</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="form-notes">Notes (optional)</label>
        <input type="text" id="form-notes" placeholder="e.g. Focus on form" />
      </div>

      <div class="form-error" id="form-error"></div>

      <div class="form-actions">
        <button class="btn btn-primary" id="save-schedule-btn">Save</button>
        <button class="btn btn-secondary" id="cancel-form-btn">Cancel</button>
      </div>
    </div>

    <div style="margin-top:14px;">
      <button class="btn btn-primary btn-xs" id="add-schedule-btn" style="padding:8px 16px;font-size:0.85rem;">+ Add Workout</button>
    </div>
  </div>

  <!-- ── Calendar ───────────────────────────────────────────────────────── -->
  <div class="card">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="prev-month">&#8249;</button>
      <h2 id="cal-heading">January 2025</h2>
      <button class="cal-nav-btn" id="next-month">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div class="cal-day-name">Sun</div>
      <div class="cal-day-name">Mon</div>
      <div class="cal-day-name">Tue</div>
      <div class="cal-day-name">Wed</div>
      <div class="cal-day-name">Thu</div>
      <div class="cal-day-name">Fri</div>
      <div class="cal-day-name">Sat</div>
    </div>
  </div>
</main>

<script src="app.js"></script>
<script>
  'use strict';
  Auth.requireAuth();

  // ── State ───────────────────────────────────────────────────────────────
  let currentYear  = new Date().getFullYear();
  let currentMonth = new Date().getMonth(); // 0-based
  let scheduleData = [];  // scheduled_workouts for visible month
  let userPlans    = [];  // assigned plans for the viewed user
  let selectedDate = null;
  let userRole     = 'user';
  let allAthletes  = [];
  let viewingUserId = null; // null = self

  const todayStr = today();

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Month helpers ────────────────────────────────────────────────────────
  function monthLabel(year, month) {
    return new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  function dateStr(year, month, day) {
    return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
  }

  function friendlyDate(ds) {
    const [y, m, d] = ds.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  // ── Load schedule data for displayed month ───────────────────────────────
  async function loadMonthData() {
    const from = dateStr(currentYear, currentMonth, 1);
    // last day of month
    const last = new Date(currentYear, currentMonth + 1, 0).getDate();
    const to   = dateStr(currentYear, currentMonth, last);

    const endpoint = viewingUserId
      ? `/schedule?userId=${viewingUserId}&from=${from}&to=${to}`
      : `/schedule?from=${from}&to=${to}`;

    scheduleData = await API.get(endpoint).catch(() => []);
  }

  async function loadUserPlans() {
    const endpoint = viewingUserId ? `/user/plans?userId=${viewingUserId}` : '/user/plans';
    userPlans = await API.get(endpoint).catch(() => []);
    rebuildPlanSelect();
  }

  function rebuildPlanSelect() {
    const sel = document.getElementById('form-plan-select');
    sel.innerHTML = '<option value="">— no plan —</option>';
    userPlans.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      sel.appendChild(opt);
    });
  }

  // ── Render calendar ───────────────────────────────────────────────────────
  function renderCalendar() {
    document.getElementById('cal-heading').textContent = monthLabel(currentYear, currentMonth);

    const grid = document.getElementById('cal-grid');
    // Remove all day cells (keep the 7 day-name headers)
    const headers = Array.from(grid.querySelectorAll('.cal-day-name'));
    grid.innerHTML = '';
    headers.forEach(h => grid.appendChild(h));

    const firstDay = new Date(currentYear, currentMonth, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

    // Build a map: dateString -> [entries]
    const byDate = {};
    scheduleData.forEach(entry => {
      if (!byDate[entry.date]) byDate[entry.date] = [];
      byDate[entry.date].push(entry);
    });

    // Prev-month padding
    for (let i = 0; i < firstDay; i++) {
      const day = daysInPrevMonth - firstDay + 1 + i;
      const cell = document.createElement('div');
      cell.className = 'cal-cell other-month';
      cell.innerHTML = `<div class="cal-date">${day}</div>`;
      grid.appendChild(cell);
    }

    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = dateStr(currentYear, currentMonth, d);
      const entries = byDate[ds] || [];
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      if (ds === todayStr) cell.classList.add('today');
      if (ds === selectedDate) cell.classList.add('selected');

      const dots = entries.slice(0, 3).map(e =>
        `<span class="cal-dot${e.plan_id ? ' plan-linked' : ''}" title="${escHtml(e.title)}"></span>`
      ).join('');
      const label = entries.length === 1
        ? `<div class="cal-dot-label">${escHtml(entries[0].title)}</div>`
        : entries.length > 1
          ? `<div class="cal-dot-label">${entries.length} workouts</div>`
          : '';

      cell.innerHTML = `
        <div class="cal-date">${d}</div>
        <div class="cal-dots">${dots}</div>
        ${label}
      `;
      cell.addEventListener('click', () => selectDay(ds));
      grid.appendChild(cell);
    }

    // Next-month padding to fill the last row
    const totalCells = firstDay + daysInMonth;
    const remainder  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= remainder; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell other-month';
      cell.innerHTML = `<div class="cal-date">${i}</div>`;
      grid.appendChild(cell);
    }
  }

  // ── Select a day ──────────────────────────────────────────────────────────
  function selectDay(ds) {
    selectedDate = ds;
    renderCalendar();
    showDayPanel(ds);
  }

  function showDayPanel(ds) {
    const panel = document.getElementById('day-panel');
    panel.style.display = 'block';
    document.getElementById('day-panel-title').textContent = friendlyDate(ds);
    hideForm();
    renderDayItems(ds);
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderDayItems(ds) {
    const items   = scheduleData.filter(e => e.date === ds);
    const container = document.getElementById('day-items');
    if (items.length === 0) {
      container.innerHTML = '<p style="color:#666;font-size:0.9rem;margin:0;">No workouts scheduled for this day.</p>';
      return;
    }
    container.innerHTML = items.map(e => {
      const planLabel = e.plan_id
        ? (userPlans.find(p => p.id === e.plan_id)?.name || 'Plan')
        : null;
      return `
        <div class="schedule-item" data-id="${e.id}">
          <div class="schedule-item-info">
            <div class="schedule-item-title">${escHtml(e.title)}</div>
            ${planLabel ? `<div class="schedule-item-meta">${escHtml(planLabel)}</div>` : ''}
            ${e.notes ? `<div class="schedule-item-notes">${escHtml(e.notes)}</div>` : ''}
          </div>
          <div class="schedule-item-actions">
            ${!viewingUserId ? `<button class="btn-xs complete btn-complete-item" data-id="${e.id}" title="Mark as completed">✓ Done</button>` : ''}
            <button class="btn-xs btn-edit-item" data-id="${e.id}" title="Edit">Edit</button>
            <button class="btn-xs danger btn-delete-item" data-id="${e.id}" title="Remove">✕</button>
          </div>
        </div>
      `;
    }).join('');

    container.querySelectorAll('.btn-edit-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const entry = scheduleData.find(e => e.id === btn.dataset.id);
        if (entry) showForm(entry);
      });
    });

    container.querySelectorAll('.btn-delete-item').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Remove this scheduled workout?')) return;
        try {
          await API.del(`/schedule/${btn.dataset.id}`);
          await refresh();
          renderDayItems(ds);
        } catch (err) { alert(err.message); }
      });
    });
    container.querySelectorAll('.btn-complete-item').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          const { workoutId } = await API.post(`/schedule/${btn.dataset.id}/complete`, {});
          if (confirm('Workout logged! View it on the Progression page?')) {
            window.location.href = 'progression.html';
          }
        } catch (err) { alert(err.message); }
      });
    });
  }

  // ── Add / Edit form ────────────────────────────────────────────────────────
  function showForm(entry = null) {
    const form = document.getElementById('schedule-form');
    form.style.display = 'block';
    document.getElementById('form-error').textContent = '';
    document.getElementById('form-title').textContent = entry ? 'Edit Workout' : 'Add Workout';
    document.getElementById('editing-id').value = entry ? entry.id : '';
    document.getElementById('form-title-input').value = entry ? entry.title : '';
    document.getElementById('form-plan-select').value  = entry?.plan_id || '';
    document.getElementById('form-notes').value        = entry ? entry.notes : '';
    document.getElementById('form-title-input').focus();
  }

  function hideForm() {
    document.getElementById('schedule-form').style.display = 'none';
    document.getElementById('form-error').textContent = '';
  }

  document.getElementById('add-schedule-btn').addEventListener('click', () => showForm());
  document.getElementById('cancel-form-btn').addEventListener('click', hideForm);
  document.getElementById('form-plan-select').addEventListener('change', function () {
    const titleInput = document.getElementById('form-title-input');
    if (this.value && !titleInput.value.trim()) {
      const plan = userPlans.find(p => p.id === this.value);
      if (plan) titleInput.value = plan.name;
    }
  });
  document.getElementById('close-day-panel').addEventListener('click', () => {
    selectedDate = null;
    document.getElementById('day-panel').style.display = 'none';
    renderCalendar();
  });

  document.getElementById('save-schedule-btn').addEventListener('click', async () => {
    const errEl    = document.getElementById('form-error');
    errEl.textContent = '';
    const editingId = document.getElementById('editing-id').value;
    const title    = document.getElementById('form-title-input').value.trim();
    const planId   = document.getElementById('form-plan-select').value || null;
    const notes    = document.getElementById('form-notes').value.trim();

    if (!title) { errEl.textContent = 'Title is required.'; return; }
    if (!selectedDate) { errEl.textContent = 'No date selected.'; return; }

    try {
      if (editingId) {
        await API.put(`/schedule/${editingId}`, { date: selectedDate, title, planId, notes });
      } else if (viewingUserId) {
        // trainer scheduling for an athlete
        await API.post('/trainer/schedule', { userId: viewingUserId, date: selectedDate, title, planId, notes });
      } else {
        await API.post('/schedule', { date: selectedDate, title, planId, notes });
      }
      hideForm();
      await refresh();
      renderDayItems(selectedDate);
    } catch (e) {
      errEl.textContent = e.message;
    }
  });

  // ── Navigation ────────────────────────────────────────────────────────────
  document.getElementById('prev-month').addEventListener('click', async () => {
    if (currentMonth === 0) { currentMonth = 11; currentYear--; }
    else { currentMonth--; }
    await refresh();
  });

  document.getElementById('next-month').addEventListener('click', async () => {
    if (currentMonth === 11) { currentMonth = 0; currentYear++; }
    else { currentMonth++; }
    await refresh();
  });

  // ── Athlete switcher (trainer/admin) ─────────────────────────────────────
  document.getElementById('athlete-select').addEventListener('change', async function () {
    viewingUserId = this.value ? parseInt(this.value, 10) : null;
    await loadUserPlans();
    await refresh();
    if (selectedDate) renderDayItems(selectedDate);
  });

  // ── Refresh helper ────────────────────────────────────────────────────────
  async function refresh() {
    await loadMonthData();
    renderCalendar();
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  (async () => {
    try {
      const me = await API.get('/user/me');
      userRole = me.role;
    } catch (e) { userRole = Auth.role() || 'user'; }

    await loadUserPlans();

    if (userRole === 'trainer' || userRole === 'admin') {
      allAthletes = await API.get('/trainer/users').catch(() => []);
      if (allAthletes.length > 0) {
        const bar = document.getElementById('athlete-bar');
        bar.style.display = 'block';
        const sel = document.getElementById('athlete-select');
        allAthletes.forEach(u => {
          const opt = document.createElement('option');
          opt.value = u.id;
          opt.textContent = u.username;
          sel.appendChild(opt);
        });
      }
    }

    await refresh();
  })();
</script>
</body>
</html>
