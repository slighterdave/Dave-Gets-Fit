<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetUs.Fit – Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <a class="brand" href="login.html"><img src="Assets/getusfit_logo.svg" alt="GetUs.Fit" class="brand-logo" /></a>
</nav>

<main style="max-width:460px;">
  <div class="hero" style="padding:40px 0 28px;">
    <h1>Welcome</h1>
    <p>Log in or create an account to start tracking.</p>
  </div>

  <div class="card" id="auth-card">
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Log In</button>
      <button class="tab-btn" id="tab-register" onclick="showTab('register')">Register</button>
    </div>

    <!-- Google Sign-In button -->
    <div id="google-signin-container" style="margin-bottom:16px;display:flex;justify-content:center;"></div>
    <div class="form-error" id="google-error" style="margin-bottom:8px;"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <hr style="flex:1;border-color:#3a3a3a;" />
      <span style="color:#666;font-size:0.8rem;">OR</span>
      <hr style="flex:1;border-color:#3a3a3a;" />
    </div>

    <!-- Login form -->
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required />
      </div>
      <div class="form-error" id="login-error"></div>
      <button type="submit" class="btn btn-primary">Log In</button>
    </form>

    <!-- Register form -->
    <form id="register-form" novalidate style="display:none;">
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="choose_a_username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" autocomplete="new-password" required />
      </div>
      <div class="form-group">
        <label for="reg-confirm">Confirm Password</label>
        <input type="password" id="reg-confirm" autocomplete="new-password" required />
      </div>
      <div class="form-error" id="reg-error"></div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>
  </div>
</main>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="app.js"></script>
<script>
  // Already logged in → go straight to the dashboard
  if (Auth.currentUser()) window.location.href = 'index.html';

  function showTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('login-form').style.display    = isLogin ? '' : 'none';
    document.getElementById('register-form').style.display = isLogin ? 'none' : '';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('login-error').textContent = '';
    document.getElementById('reg-error').textContent   = '';
  }

  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    errEl.textContent = '';
    if (!username || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
    const result = await Auth.login(username, password);
    if (!result.ok) { errEl.textContent = result.error; return; }
    window.location.href = 'index.html';
  });

  document.getElementById('register-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    const errEl    = document.getElementById('reg-error');
    errEl.textContent = '';

    if (!username || !password || !confirm) { errEl.textContent = 'Please fill in all fields.'; return; }
    if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; return; }
    if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; return; }

    const result = await Auth.register(username, password);
    if (!result.ok) { errEl.textContent = result.error; return; }
    window.location.href = 'index.html';
  });

  // Initialise Google Sign-In once the GSI library and config are both ready
  async function initGoogleSignIn() {
    try {
      const config = await API.getRaw('/config');
      if (!config.googleClientId) return; // Google Sign-In not configured
      if (typeof google === 'undefined') return; // GSI script not yet loaded

      google.accounts.id.initialize({
        client_id: config.googleClientId,
        callback: handleGoogleCredential,
      });
      google.accounts.id.renderButton(
        document.getElementById('google-signin-container'),
        { theme: 'filled_black', size: 'large', text: 'continue_with', shape: 'rectangular', width: 280 }
      );
    } catch (e) {
      console.warn('Google Sign-In init failed:', e.message);
    }
  }

  async function handleGoogleCredential(response) {
    const errEl = document.getElementById('google-error');
    errEl.textContent = '';
    const result = await Auth.loginWithGoogle(response.credential);
    if (!result.ok) { errEl.textContent = result.error; return; }
    window.location.href = 'index.html';
  }

  // Wait for both the page and the GSI library to be ready
  window.addEventListener('load', () => {
    if (typeof google !== 'undefined') {
      initGoogleSignIn();
    } else {
      const gsiScript = document.querySelector('script[src*="accounts.google.com/gsi/client"]');
      if (gsiScript) gsiScript.addEventListener('load', initGoogleSignIn);
    }
  });
</script>
</body>
</html>
